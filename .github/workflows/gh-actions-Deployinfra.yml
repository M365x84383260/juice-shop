name: Deploy Infrastructure

on:
  push:
    branches:
      - none
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  DeployDevInfrastructure_Stage_DeployInfrastructure:
    name: Deploy Development Infrastructure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Create Resource Groups
        uses: azure/cli@v3
        with:
          inlineScript: |
            az group create --name ${{ secrets.DEVRESOURCEGROUP }} --location ${{ secrets.LOCATION }} --tags LabInstance=${{ secrets.LABINSTANCEID }}
            az group create --name ${{ secrets.PRODRESOURCEGROUP }} --location ${{ secrets.LOCATION }} --tags LabInstance=${{ secrets.LABINSTANCEID }}

      - name: Deploy Dev Infra
        uses: azure/cli@v3
        with:
          inlineScript: |
            az deployment group create \
              --resource-group ${{ secrets.DEVRESOURCEGROUP }} \
              --name deployinfradev \
              --template-file ARM-DevSecOps.json

  DeployProdInfrastructure_Stage_DeployInfrastructure:
    name: Deploy Production Infrastructure
    needs: [DeployDevInfrastructure_Stage_DeployInfrastructure]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Deploy Prod Infra
        uses: azure/cli@v3
        with:
          inlineScript: |
            az deployment group create \
              --resource-group ${{ secrets.PRODRESOURCEGROUP }} \
              --name deployinfraprod \
              --template-file ARM-DevSecOps-Prod.json
